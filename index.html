<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F5F2E9">
<title>Queijaria da Família</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --fundo:#F5F2E9; --card:#FFFDF8; --tinta:#2B2419; --tinta-mole:#6B5E48;
  --ouro:#D99A2B; --ouro-esc:#B57A15; --verde:#4E7C3A; --azul:#4A6FA5;
  --vermelho:#C0392B; --linha:#E7E0CF; --linha-forte:#D8CFB8;
  --sombra:0 1px 2px rgba(43,36,25,.06),0 8px 24px rgba(43,36,25,.05);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:Inter,system-ui,sans-serif;color:var(--tinta);background:var(--fundo);
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.serif{font-family:Fraunces,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
.hidden{display:none!important}

/* ---------- Telas de entrada ---------- */
.centro{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;
  align-items:center;padding:28px;gap:18px;text-align:center}
.marca{display:flex;flex-direction:column;align-items:center;gap:10px}
.marca h1{font-family:Fraunces;font-weight:600;font-size:30px;margin:0;letter-spacing:-.02em}
.marca p{margin:0;color:var(--tinta-mole);font-size:14px}
.painel{background:var(--card);border:1px solid var(--linha);border-radius:var(--r);
  box-shadow:var(--sombra);padding:22px;width:100%;max-width:400px;text-align:left}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:13px;font-weight:600;color:var(--tinta-mole);margin-bottom:6px}
.campo input,.campo select{width:100%;padding:12px 14px;border:1px solid var(--linha-forte);
  border-radius:12px;background:#fff;color:var(--tinta);outline:none;transition:border-color .15s}
.campo input:focus,.campo select:focus{border-color:var(--ouro)}
.linha-campos{display:flex;gap:10px}
.linha-campos>.campo{flex:1}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;
  border-radius:12px;font-weight:600;font-size:15px;transition:transform .05s,filter .15s}
.btn:active{transform:scale(.985)}
.btn-primario{background:var(--ouro);color:#3a2a05}
.btn-primario:hover{filter:brightness(1.03)}
.btn-fantasma{background:transparent;color:var(--tinta-mole);font-weight:500;font-size:14px;padding:8px}
.btn-fantasma:hover{color:var(--tinta)}
.aviso-config{max-width:420px;background:#fff6e6;border:1px solid var(--ouro);border-radius:12px;
  padding:14px 16px;font-size:13px;line-height:1.5;color:var(--ouro-esc);text-align:left}
.aviso-config code{background:#00000010;padding:1px 5px;border-radius:5px;font-family:'IBM Plex Mono',monospace}
.erro{color:var(--vermelho);font-size:13px;margin-top:4px;min-height:16px}

/* ---------- App ---------- */
#app{max-width:520px;margin:0 auto;min-height:100dvh;
  padding-bottom:calc(78px + env(safe-area-inset-bottom))}
.topo{position:sticky;top:0;z-index:20;background:rgba(245,242,233,.86);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--linha);
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
  display:flex;align-items:center;justify-content:space-between}
.topo .tit{display:flex;align-items:center;gap:9px}
.topo .tit b{font-family:Fraunces;font-weight:600;font-size:18px;letter-spacing:-.01em}
.topo-acoes{display:flex;gap:4px}
.icone-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--tinta-mole)}
.icone-btn:hover{background:#00000008;color:var(--tinta)}
.conteudo{padding:18px}
.view{animation:sobe .25s ease}
@keyframes sobe{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.rotulo{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--tinta-mole);margin:22px 2px 10px}
.rotulo:first-child{margin-top:4px}

/* resumo */
.resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:13px 12px}
.stat .n{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:23px;line-height:1;letter-spacing:-.02em}
.stat .l{font-size:11px;color:var(--tinta-mole);margin-top:6px;line-height:1.25}
.stat.g .n{color:var(--ouro-esc)} .stat.v .n{color:var(--verde)} .stat.a .n{color:var(--azul)}

/* card herói: próximo a ficar pronto */
.heroi{background:var(--card);border:1px solid var(--linha);border-radius:var(--r);
  box-shadow:var(--sombra);padding:18px;display:flex;gap:18px;align-items:center;margin-top:10px}
.heroi .roda{flex-shrink:0}
.heroi .info .k{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ouro-esc)}
.heroi .info h2{font-family:Fraunces;font-weight:600;font-size:22px;margin:4px 0 2px;letter-spacing:-.01em}
.heroi .info .quando{font-size:14px;color:var(--tinta-mole)}
.heroi .info .quando .mono{color:var(--tinta);font-weight:600}

/* alertas */
.alerta{display:flex;align-items:center;gap:12px;
  background:#fdecec;border:1px solid #f3c9c4;border-radius:13px;padding:12px 14px;margin-bottom:8px}
.alerta svg{color:var(--vermelho);flex-shrink:0}
.alerta .txt{font-size:13.5px;line-height:1.35}
.alerta .txt b{font-weight:600}

/* lista de lotes */
.lote{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:14px;margin-bottom:10px}
.lote-cab{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.lote-cab h3{font-size:16px;font-weight:600;margin:0}
.lote-cab .sub{font-size:12.5px;color:var(--tinta-mole);margin-top:2px}
.pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap;letter-spacing:.02em}
.pill.curando{background:#f7ead0;color:var(--ouro-esc)}
.pill.pronto{background:#e2f0d9;color:var(--verde)}
.pill.vendido{background:#e2e9f3;color:var(--azul)}
.pill.descartado{background:#eee;color:#888}
.barra{height:8px;border-radius:99px;background:#ece5d5;overflow:hidden;margin:12px 0 8px}
.barra > i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
.lote-rod{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--tinta-mole)}
.lote-rod .mono{color:var(--tinta);font-weight:600}
.lote-acoes{display:flex;gap:8px;margin-top:12px}
.mini{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--linha-forte);background:#fff;color:var(--tinta)}
.mini:hover{border-color:var(--ouro)}
.mini.forte{background:var(--verde);border-color:var(--verde);color:#fff}
.mini.forte:hover{filter:brightness(1.04)}

/* tipos */
.tipo{display:flex;justify-content:space-between;align-items:center;background:var(--card);
  border:1px solid var(--linha);border-radius:13px;padding:13px 14px;margin-bottom:9px}
.tipo .nome{font-weight:600}
.tipo .det{font-size:12.5px;color:var(--tinta-mole);margin-top:2px}
.tipo .preco{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ouro-esc)}

.vazio{text-align:center;color:var(--tinta-mole);padding:34px 20px;font-size:14px;line-height:1.5}
.vazio svg{opacity:.4;margin-bottom:10px}

/* FAB */
.fab{position:fixed;right:calc(50% - 260px + 18px);bottom:calc(90px + env(safe-area-inset-bottom));
  width:56px;height:56px;border-radius:18px;background:var(--ouro);color:#3a2a05;
  display:grid;place-items:center;box-shadow:0 6px 20px rgba(217,154,43,.4);z-index:25}
.fab:active{transform:scale(.94)}
@media(max-width:556px){.fab{right:18px}}

/* nav inferior */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,253,248,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--linha);
  display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;
  font-weight:600;color:var(--tinta-mole);padding:4px 20px;border-radius:10px}
.nav a.ativo{color:var(--ouro-esc)}
.nav a svg{width:23px;height:23px}

/* modal */
.overlay{position:fixed;inset:0;z-index:50;background:rgba(43,36,25,.4);backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.folha{background:var(--fundo);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  padding:8px 20px calc(24px + env(safe-area-inset-bottom));max-height:92dvh;overflow:auto;animation:sobeF .28s cubic-bezier(.2,.8,.2,1)}
@keyframes sobeF{from{transform:translateY(100%)}to{transform:none}}
.pega{width:40px;height:5px;border-radius:99px;background:var(--linha-forte);margin:8px auto 14px}
.folha h2{font-family:Fraunces;font-weight:600;font-size:21px;margin:0 0 4px}
.folha .dica{font-size:13px;color:var(--tinta-mole);margin:0 0 18px}
.previa{background:#fff6e6;border:1px solid #f0dcae;border-radius:12px;padding:12px 14px;
  font-size:13px;color:var(--ouro-esc);margin:4px 0 16px;line-height:1.5}
.previa b{font-family:'IBM Plex Mono',monospace}

/* toast */
#toast{position:fixed;bottom:calc(94px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  z-index:80;background:var(--tinta);color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;
  font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#toast.ver{opacity:1;transform:translateX(-50%) translateY(-4px)}
#toast.erro-t{background:var(--vermelho)}

.oculto-val{letter-spacing:1px;color:var(--tinta-mole)}
.carregando{display:grid;place-items:center;min-height:60vh;color:var(--tinta-mole)}
.spin{width:26px;height:26px;border:3px solid var(--linha-forte);border-top-color:var(--ouro);
  border-radius:50%;animation:g .8s linear infinite}
@keyframes g{to{transform:rotate(360deg)}}
.subnav{display:flex;gap:5px;background:var(--card);border:1px solid var(--linha);border-radius:12px;padding:4px;margin-bottom:14px;box-shadow:var(--sombra)}
.subnav a{flex:1;text-align:center;padding:9px 4px;border-radius:9px;font-size:.8rem;font-weight:600;color:var(--tinta);opacity:.5;cursor:pointer;white-space:nowrap;transition:all .15s}
.subnav a.ativo{background:var(--ouro);color:#fff;opacity:1}
.tipo .ver{color:var(--tinta-mole);font-size:1.4rem;line-height:1;padding-left:8px}
.verbadge{font-size:.62rem;font-weight:700;color:var(--tinta-mole);background:var(--linha);
  padding:2px 6px;border-radius:20px;margin-left:6px;letter-spacing:.5px;vertical-align:middle}
</style>
</head>
<body>

<!-- CARREGANDO -->
<div id="tela-carregando" class="centro">
  <div class="marca"><div class="spin"></div></div>
</div>

<!-- LOGIN / CADASTRO -->
<div id="tela-auth" class="centro hidden">
  <div class="marca">
    <img src="logo.png" alt="Queijaria do Bené" style="width:96px;height:96px;object-fit:contain;margin:0 auto 4px;display:block" onerror="this.style.display='none'">
    <h1 class="serif">Queijaria da Família</h1>
    <p>Produção, cura e vendas num lugar só</p>
  </div>
  <div id="aviso-config" class="aviso-config hidden">
    <b>Falta configurar.</b> Preencha <code>SUPABASE_URL</code> e <code>SUPABASE_ANON_KEY</code> no topo do <code>index.html</code> com os dados do seu projeto Supabase.
  </div>
  <form class="painel" id="au-form">
    <div class="campo">
      <label>E-mail</label>
      <input id="au-email" name="username" type="email" autocomplete="username" placeholder="voce@email.com">
    </div>
    <div class="campo">
      <label>Senha</label>
      <input id="au-senha" name="password" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="erro" id="au-erro"></div>
    <button class="btn btn-primario" id="au-entrar" type="submit">Entrar</button>
    <button class="btn btn-fantasma" id="au-alternar" type="button" style="margin-top:6px">Não tem conta? Criar uma</button>
  </form>
</div>

<!-- CRIAR FAMÍLIA -->
<div id="tela-familia" class="centro hidden">
  <div class="marca">
    <h1 class="serif">Sua queijaria</h1>
    <p>Dê um nome. Depois é só adicionar quem produz junto.</p>
  </div>
  <div class="painel">
    <div class="campo">
      <label>Nome da queijaria / família</label>
      <input id="fam-nome" type="text" placeholder="Ex.: Queijaria do Sítio">
    </div>
    <div class="erro" id="fam-erro"></div>
    <button class="btn btn-primario" id="fam-criar">Criar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="topo">
    <div class="tit">
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none"><path d="M24 8 42 20v4H6v-4L24 8Z" fill="#D99A2B"/><path d="M6 24h36v10a4 4 0 0 1-4 4H10a4 4 0 0 1-4-4V24Z" fill="#B57A15"/></svg>
      <b id="topo-nome">Queijaria</b>
      <span id="topo-ver" class="verbadge"></span>
    </div>
    <div class="topo-acoes">
      <button class="icone-btn" id="btn-privacidade" title="Ocultar valores"></button>
      <button class="icone-btn" id="btn-sair" title="Sair">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="conteudo">
    <div id="view-inicio" class="view"></div>
    <div id="view-producao" class="view hidden"></div>
    <div id="view-leite" class="view hidden"></div>
    <div id="view-cadastro" class="view hidden"></div>
  </main>

  <button class="fab" id="fab" title="Novo lote">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <nav class="nav">
    <a data-nav="inicio" class="ativo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/></svg>
      Início
    </a>
    <a data-nav="producao">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 20 7v10L4 13z"/><circle cx="9" cy="12" r="1"/><circle cx="14" cy="11" r="1"/></svg>
      Produção
    </a>
    <a data-nav="leite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8l-1 3H9L8 2Z"/><path d="M7 5h10l-1.2 15.2a1 1 0 0 1-1 .8H9.2a1 1 0 0 1-1-.8L7 5Z"/><path d="M7.6 11h8.8"/></svg>
      Leite
    </a>
    <a data-nav="cadastro">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>
      Cadastro
    </a>
  </nav>
</div>

<div id="modal-host"></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =======================================================================
   CONFIG  — preencha com os dados do SEU projeto Supabase
   ======================================================================= */
const SUPABASE_URL      = "https://cadnmgaymgljmoadebkk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uBKKvD_e5ef4326TvkFgcg_rRnjmTus";
const APP_VER = "v5";                              // suba junto com o cache do sw.js

/* ===================== estado ===================== */
let sb = null;
let sessao = null;
let familiaId = null;
let familiaNome = "";
let privado = false;
const state = { tipos: [], lotes: [], fornecedores: [], leiteFaixas: [], insumos: [], config: {}, recebimentos: [] };

/* ===================== utilidades ===================== */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const hoje = () => new Date().toISOString().slice(0,10);
const uid  = () => (crypto.randomUUID ? crypto.randomUUID()
  : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c==="x"?r:(r&0x3|0x8)).toString(16);}));
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function diffDias(ate){ // dias de hoje até 'ate' (AAAA-MM-DD); pode ser negativo
  const a = new Date(hoje()+"T00:00:00"), b = new Date(ate+"T00:00:00");
  return Math.round((b - a) / 86400000);
}
function addDias(data, n){
  const d = new Date(data+"T00:00:00"); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function dataBR(iso){ if(!iso) return "—"; const [a,m,d]=iso.split("-"); return `${d}/${m}/${a}`; }

/* formatação CENTRALIZADA (permite modo privacidade num toggle só) */
function brl(v){
  if(privado) return `<span class="oculto-val">R$ •••</span>`;
  return "R$ " + (Number(v)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function num(v, casas=0){
  const n = Number(v)||0;
  return n.toLocaleString("pt-BR",{minimumFractionDigits:casas,maximumFractionDigits:casas});
}

/* estado de cura de um lote */
function curaDoLote(l){
  const dc = Number(l.dias_cura)||0;
  let pct, restam;
  if(dc <= 0){ pct = 100; restam = 0; }
  else {
    const decorrido = -diffDias(l.data_fabricacao); // dias desde a fabricação (>=0 se no passado)
    pct = Math.max(0, Math.min(100, Math.round((decorrido / dc) * 100)));
    restam = Math.max(0, l.data_pronto ? diffDias(l.data_pronto) : dc - decorrido);
  }
  let status = l.status;
  if(status === "curando" && pct >= 100) status = "pronto"; // pronto por tempo
  const venceEm = l.validade ? diffDias(l.validade) : null;
  const vencendo = (venceEm !== null) && venceEm <= 7 && status !== "vendido" && status !== "descartado";
  return { pct, restam, status, venceEm, vencendo };
}
function corBarra(status, pct){
  if(status === "pronto") return "var(--verde)";
  if(status === "vendido") return "var(--azul)";
  return "var(--ouro)"; // curando
}
function rotStatus(s){ return {curando:"Curando",pronto:"Pronto",vendido:"Vendido",descartado:"Descartado"}[s]||s; }

/* toast */
let toastT;
function toast(msg, erro=false){
  const t = $("#toast"); t.textContent = msg;
  t.className = "ver" + (erro ? " erro-t" : "");
  clearTimeout(toastT); toastT = setTimeout(()=> t.className = "", 2600);
}

/* ===================== boot ===================== */
function configOk(){
  return SUPABASE_URL && SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 20;
}

function iniciar(){
  if(!configOk()){
    mostrarTela("tela-auth");
    $("#aviso-config").classList.remove("hidden");
    $("#au-entrar").disabled = true;
    return;
  }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({ data }) => {
    if(data.session){ sessao = data.session; aposLogin(); }
    else mostrarTela("tela-auth");
  }).catch(()=> mostrarTela("tela-auth"));

  sb.auth.onAuthStateChange((_e, s) => {
    sessao = s;
    if(!s){ familiaId = null; mostrarTela("tela-auth"); }
  });
}

function mostrarTela(id){
  ["tela-carregando","tela-auth","tela-familia","app"].forEach(t =>
    $("#"+t).classList.toggle("hidden", t !== id));
}

/* ===================== auth ===================== */
let modoCadastro = false;
$("#au-alternar").onclick = () => {
  modoCadastro = !modoCadastro;
  $("#au-entrar").textContent = modoCadastro ? "Criar conta" : "Entrar";
  $("#au-alternar").textContent = modoCadastro ? "Já tenho conta. Entrar" : "Não tem conta? Criar uma";
  $("#au-erro").textContent = "";
};
$("#au-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const email = $("#au-email").value.trim();
  const senha = $("#au-senha").value;
  const err = $("#au-erro");
  if(!email || !senha){ err.textContent = "Preencha e-mail e senha."; return; }
  $("#au-entrar").disabled = true;
  try{
    if(modoCadastro){
      const { error } = await sb.auth.signUp({ email, password: senha });
      if(error) throw error;
      const { data } = await sb.auth.getSession();
      if(!data.session){ err.textContent = ""; toast("Conta criada. Confirme o e-mail e entre."); modoCadastro=false; $("#au-alternar").click(); $("#au-alternar").click(); return; }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password: senha });
      if(error) throw error;
    }
    const { data } = await sb.auth.getSession();
    sessao = data.session;
    if(sessao) aposLogin();
  }catch(e){
    err.textContent = traduzErro(e.message);
  }finally{
    $("#au-entrar").disabled = false;
  }
});
function traduzErro(m=""){
  m = m.toLowerCase();
  if(m.includes("invalid login")) return "E-mail ou senha incorretos.";
  if(m.includes("already registered")) return "Esse e-mail já tem conta. Faça login.";
  if(m.includes("password")) return "A senha precisa de pelo menos 6 caracteres.";
  return "Algo deu errado. Tente de novo.";
}

$("#btn-sair").onclick = async () => { await sb.auth.signOut(); location.reload(); };

/* ===================== família ===================== */
async function aposLogin(){
  mostrarTela("tela-carregando");
  try{
    const { data, error } = await sb.from("familia_membros")
      .select("familia_id, familias(nome)").limit(1);
    if(error) throw error;
    if(data && data.length){
      familiaId  = data[0].familia_id;
      familiaNome = data[0].familias ? data[0].familias.nome : "Queijaria";
      abrirApp();
    } else {
      mostrarTela("tela-familia");
    }
  }catch(e){
    toast("Erro ao carregar. Veja se rodou o SQL no Supabase.", true);
    mostrarTela("tela-familia");
  }
}
$("#fam-criar").onclick = async () => {
  const nome = $("#fam-nome").value.trim();
  const err = $("#fam-erro");
  if(!nome){ err.textContent = "Dê um nome pra sua queijaria."; return; }
  $("#fam-criar").disabled = true;

/* ===================== dados ===================== */
async function carregarTudo(){
  const q = (p) => p.then(r => r.data || []).catch(() => []);
  const [t, l, f, lf, ins, rec] = await Promise.all([
    q(sb.from("tipos_queijo").select("*").eq("familia_id", familiaId).order("nome")),
    q(sb.from("lotes").select("*").eq("familia_id", familiaId).order("data_fabricacao", { ascending:false })),
    q(sb.from("fornecedores").select("*").eq("familia_id", familiaId).order("nome")),
    q(sb.from("leite_faixas").select("*").eq("familia_id", familiaId).order("litros_de")),
    q(sb.from("insumos").select("*").eq("familia_id", familiaId).order("nome")),
    q(sb.from("recebimentos_leite").select("*").eq("familia_id", familiaId).order("data", { ascending:false }))
  ]);
  let cfg = {};
  try { const r = await sb.from("queijaria_config").select("*").eq("familia_id", familiaId).maybeSingle(); cfg = r.data || {}; } catch(e){}
  state.tipos = t; state.lotes = l; state.fornecedores = f; state.leiteFaixas = lf; state.insumos = ins; state.config = cfg; state.recebimentos = rec;
}

/* ===================== app / navegação ===================== */
async function abrirApp(){
  $("#topo-nome").textContent = familiaNome;
  $("#topo-ver").textContent = APP_VER;
  mostrarTela("app");
  atualizarOlho();

}
$$(".nav a").forEach(a => a.onclick = () => irPara(a.dataset.nav));
function irPara(nome){
  $$(".nav a").forEach(a => a.classList.toggle("ativo", a.dataset.nav === nome));
  ["inicio","producao","leite","cadastro"].forEach(v => $("#view-"+v).classList.add("hidden"));

  v.style.animation = "none"; void v.offsetWidth; v.style.animation = "";

  if(nome === "producao") renderProducao();

/* ===================== render: INÍCIO ===================== */
function anelSVG(pct, cor){
  const R=30, C=2*Math.PI*R, off=C*(1-pct/100);
  return `<svg width="82" height="82" viewBox="0 0 82 82" class="roda">
    <circle cx="41" cy="41" r="${R}" fill="none" stroke="#ece5d5" stroke-width="9"/>
    <circle cx="41" cy="41" r="${R}" fill="none" stroke="${cor}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
      transform="rotate(-90 41 41)" style="transition:stroke-dashoffset .6s ease"/>
    <text x="41" y="45" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-weight="600"
      font-size="17" fill="#2B2419">${pct}%</text>
  </svg>`;
}
function nomeTipo(id){ const t = state.tipos.find(x=>x.id===id); return t ? t.nome : "Sem tipo"; }

function renderInicio(){
  const ativos = state.lotes.filter(l => l.status !== "vendido" && l.status !== "descartado");
  const comp = ativos.map(l => ({ l, c: curaDoLote(l) }));
  const emCura  = comp.filter(x => x.c.status === "curando").reduce((s,x)=> s + (Number(x.l.pecas_produzidas)||0), 0);
  const prontas = comp.filter(x => x.c.status === "pronto").reduce((s,x)=> s + (Number(x.l.pecas_produzidas)||0), 0);

  // próximo a ficar pronto (menor % restante entre os que ainda curam)
  const curando = comp.filter(x => x.c.status === "curando").sort((a,b)=> a.c.restam - b.c.restam);
  const proximo = curando[0];

  // vencendo
  const vencendo = comp.filter(x => x.c.vencendo).sort((a,b)=> a.c.venceEm - b.c.venceEm);

  let html = `
    <div class="resumo">
      <div class="stat g"><div class="n">${num(emCura)}</div><div class="l">peças em cura</div></div>
      <div class="stat v"><div class="n">${num(prontas)}</div><div class="l">peças prontas</div></div>
      <div class="stat a"><div class="n">${ativos.length}</div><div class="l">lotes ativos</div></div>
    </div>`;

  if(proximo){
    const { l, c } = proximo;
    html += `
      <div class="rotulo">Próximo a ficar pronto</div>
      <div class="heroi">
        ${anelSVG(c.pct, "var(--ouro)")}
        <div class="info">
          <div class="k">Curando</div>
          <h2>${esc(nomeTipo(l.tipo_queijo_id))}</h2>
          <div class="quando">pronto em <span class="mono">${c.restam}</span> ${c.restam===1?"dia":"dias"} · ${dataBR(l.data_pronto)}</div>
        </div>
      </div>`;
  }

  if(vencendo.length){
    html += `<div class="rotulo">Girar o estoque</div>`;
    vencendo.forEach(({l,c}) => {
      const txt = c.venceEm < 0 ? `venceu há ${Math.abs(c.venceEm)} ${Math.abs(c.venceEm)===1?"dia":"dias"}`
                : c.venceEm === 0 ? "vence hoje" : `vence em ${c.venceEm} ${c.venceEm===1?"dia":"dias"}`;
      html += `<div class="alerta">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div class="txt"><b>${esc(nomeTipo(l.tipo_queijo_id))}</b> — ${txt} · ${num(l.pecas_produzidas)} peças</div>
      </div>`;
    });
  }

  html += `<div class="rotulo">Lotes na queijaria</div>`;
  if(!ativos.length){
    html += vazioLotes();
  } else {
    html += comp
      .sort((a,b)=> statusPeso(a.c.status)-statusPeso(b.c.status) || a.c.restam-b.c.restam)
      .map(({l,c}) => cardLote(l,c)).join("");
  }
  $("#view-inicio").innerHTML = html;
}
function statusPeso(s){ return {pronto:0,curando:1,vendido:2,descartado:3}[s] ?? 9; }

function cardLote(l, c){
  const cor = corBarra(c.status, c.pct);
  const restoTxt = c.status === "curando"
    ? `<span class="mono">${c.restam}</span> ${c.restam===1?"dia":"dias"} p/ ficar pronto`
    : c.status === "pronto" ? `pronto desde ${dataBR(l.data_pronto)}`
    : `${dataBR(l.data_fabricacao)}`;
  let acoes = "";
  if(c.status === "pronto")  acoes = `<button class="mini forte" data-vender="${l.id}">Registrar venda</button>`;
  if(c.status === "curando") acoes = `<button class="mini" data-pronto="${l.id}">Marcar pronto agora</button>`;
  return `<div class="lote">
    <div class="lote-cab">
      <div>
        <h3>${esc(nomeTipo(l.tipo_queijo_id))}</h3>
        <div class="sub">Fabricado ${dataBR(l.data_fabricacao)} · ${num(l.litros_leite)} L de leite</div>
      </div>
      <span class="pill ${c.status}">${rotStatus(c.status)}</span>
    </div>
    <div class="barra"><i style="width:${c.pct}%;background:${cor}"></i></div>
    <div class="lote-rod">
      <span>${restoTxt}</span>
      <span class="mono">${num(l.pecas_produzidas)} peças</span>
    </div>
    ${acoes ? `<div class="lote-acoes">${acoes}</div>` : ""}
  </div>`;
}
function vazioLotes(){
  return `<div class="vazio">
    <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 11 20 7v10L4 13z"/></svg>
    <div>Nenhum lote ainda.<br>Toque no <b>+</b> pra registrar sua primeira produção.</div>
  </div>`;
}

document.addEventListener("click", (e) => {
  const p = e.target.closest("[data-pronto]");

  if(p) marcarPronto(p.dataset.pronto);

async function marcarPronto(id){
  const l = state.lotes.find(x=>x.id===id); if(!l) return;
  l.status = "pronto"; l.data_pronto = l.data_pronto || hoje(); // otimista
  irPara(paginaAtual());
  const { error } = await sb.from("lotes").update({ status:"pronto" }).eq("id", id);
  if(error){ l.status = "curando"; irPara(paginaAtual()); toast("Não deu pra atualizar.", true); }
  else toast("Lote marcado como pronto.");
}
async function registrarVenda(id){
  // v1: baixa simples do lote como vendido. (Fluxo completo de vendas vem depois.)
  const l = state.lotes.find(x=>x.id===id); if(!l) return;
  const anterior = l.status;
  l.status = "vendido"; irPara(paginaAtual()); // otimista
  const { error } = await sb.from("lotes").update({ status:"vendido" }).eq("id", id);
  if(error){ l.status = anterior; irPara(paginaAtual()); toast("Não deu pra registrar.", true); }
  else toast("Lote marcado como vendido.");
}

function renderProducao(){

/* ===================== render: RECEBIMENTO DE LEITE ===================== */
function nomeForn(id){ const f = state.fornecedores.find(x=>x.id===id); return f ? f.nome : "Fornecedor"; }
function mesAtual(){ return hoje().slice(0,7); }

// preço por litro conforme a quantidade (faixa) ou preço padrão
function precoLitroPara(litros){
  const l = Number(litros)||0;
  const faixas = [...state.leiteFaixas].sort((a,b)=>(Number(a.litros_de)||0)-(Number(b.litros_de)||0));
  const faixa = faixas.find(f => l >= (Number(f.litros_de)||0) && (f.litros_ate==null || l <= Number(f.litros_ate)));
  if(faixa) return Number(faixa.preco)||0;
  return Number(state.config.preco_leite_padrao)||0;
}

function renderRecebimento(){
  const recs = state.recebimentos;
  const doMes = recs.filter(r => (r.data||"").slice(0,7) === mesAtual());
  const litrosMes = doMes.reduce((s,r)=> s + (Number(r.litros)||0), 0);
  const valorMes  = doMes.reduce((s,r)=> s + (Number(r.valor_total)||0), 0);

  let html = `
    <div class="resumo">
      <div class="stat g"><div class="n">${num(litrosMes)}</div><div class="l">litros no mês</div></div>
      <div class="stat a"><div class="n" style="font-size:1.05rem">${brl(valorMes)}</div><div class="l">a pagar no mês</div></div>
    </div>
    <div class="rotulo">Recebimentos</div>`;

  if(!recs.length){
    html += vazioCad("Toque no <b>+</b> pra lançar uma entrega:<br>fornecedor, data e litros. O preço é calculado sozinho.");
  } else {
    html += recs.map(r => `
      <div class="tipo" data-rec="${r.id}">
        <div>
          <div class="nome">${esc(nomeForn(r.fornecedor_id))}</div>
          <div class="det">${dataBR(r.data)} · ${num(r.litros)} L × ${brl(r.preco_litro)}/L</div>
        </div>
        <div class="preco">${brl(r.valor_total)}</div>
      </div>`).join("");
  }
  $("#view-leite").innerHTML = html;
  $$("#view-leite [data-rec]").forEach(el => el.onclick = () => abrirModalRecebimento(el.dataset.rec));
}

function abrirModalRecebimento(id){
  if(!state.fornecedores.length){
    toast("Cadastre um fornecedor primeiro.");
    irPara("cadastro"); cadAba = "fornecedores"; renderCadastro(); setTimeout(() => abrirModalFornecedor(), 250); return;
  }
  const r = state.recebimentos.find(x=>x.id===id) || {};
  const opts = state.fornecedores.map(f=>`<option value="${f.id}" ${r.fornecedor_id===f.id?"selected":""}>${esc(f.nome)}</option>`).join("");
  abrirFolha(`
    <h2>${id?"Editar":"Novo"} recebimento</h2>
    <div class="campo"><label>Fornecedor</label><select id="r-forn">${opts}</select></div>
    <div class="linha-campos">
      <div class="campo"><label>Data</label><input id="r-data" type="date" value="${r.data||hoje()}"></div>
      <div class="campo"><label>Litros</label><input id="r-litros" type="number" inputmode="decimal" value="${r.litros??""}" placeholder="0"></div>
    </div>
    <div class="previa" id="r-previa"></div>
    <div class="erro" id="r-erro"></div>
    <button class="btn btn-primario" id="r-salvar">Salvar</button>
    ${botaoExcluir(id?"r-excluir":"","Excluir recebimento")}`);
  const previa = () => {
    const litros = parseFloat($("#r-litros").value)||0;
    const pl = precoLitroPara(litros);
    $("#r-previa").innerHTML = litros>0
      ? `Preço: <b>${brl(pl)}/L</b> — total <b>${brl(litros*pl)}</b>`
      : "Informe os litros pra calcular o valor.";
  };
  $("#r-litros").oninput = previa;
  previa();
  $("#r-salvar").onclick = () => salvarRecebimento(id);
  if(id) $("#r-excluir").onclick = () => excluirRecebimento(id);
}
async function salvarRecebimento(id){
  const fornecedor_id = $("#r-forn").value;
  const data = $("#r-data").value || hoje();
  const litros = parseFloat($("#r-litros").value)||0;
  if(!fornecedor_id){ $("#r-erro").textContent = "Escolha o fornecedor."; return; }
  if(litros <= 0){ $("#r-erro").textContent = "Informe os litros."; return; }
  const preco_litro = precoLitroPara(litros);
  const dados = { fornecedor_id, data, litros, preco_litro, valor_total: Math.round(litros*preco_litro*100)/100 };
  if(id){
    const r = state.recebimentos.find(x=>x.id===id); const bak = {...r}; Object.assign(r, dados);
    state.recebimentos.sort((a,b)=>String(b.data).localeCompare(String(a.data)));
    fecharModal(); renderRecebimento(); toast("Recebimento atualizado.");
    const { error } = await sb.from("recebimentos_leite").update(dados).eq("id", id);
    if(error){ Object.assign(r, bak); renderRecebimento(); toast("Não deu pra salvar.", true); }
  } else {
    const novo = { id:uid(), familia_id:familiaId, ...dados };
    state.recebimentos.unshift(novo); fecharModal(); renderRecebimento(); toast("Recebimento lançado.");
    const { error } = await sb.from("recebimentos_leite").insert(novo);
    if(error){ state.recebimentos = state.recebimentos.filter(x=>x.id!==novo.id); renderRecebimento(); toast("Não deu pra salvar.", true); }
  }
}
async function excluirRecebimento(id){
  const bak = state.recebimentos; state.recebimentos = state.recebimentos.filter(x=>x.id!==id);
  fecharModal(); renderRecebimento(); toast("Recebimento excluído.");
  const { error } = await sb.from("recebimentos_leite").delete().eq("id", id);
  if(error){ state.recebimentos = bak; renderRecebimento(); toast("Não deu pra excluir.", true); }
}

/* ===================== render: CADASTRO ===================== */
let cadAba = "fornecedores";
const CAD_ABAS = [["fornecedores","Fornecedores"],["leite","Leite"],["queijos","Queijos"],["insumos","Insumos"]];

function prazoRot(d){ d = Number(d)||0; return d === 1 ? "1 dia" : `${d} dias`; }
function ordenarPorNome(arr){ arr.sort((a,b)=>String(a.nome||"").localeCompare(String(b.nome||""))); }
function botaoNovo(id, label){
  return `<button class="btn btn-primario" id="${id}" style="margin-top:14px">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    ${label}</button>`;
}
function vazioCad(txt){ return `<div class="vazio"><div>${txt}</div></div>`; }

function renderCadastro(){
  const subnav = CAD_ABAS.map(([k,r]) => `<a data-cad="${k}" class="${k===cadAba?"ativo":""}">${r}</a>`).join("");
  $("#view-cadastro").innerHTML = `<div class="subnav">${subnav}</div><div id="cad-corpo"></div>`;
  $$("#view-cadastro .subnav a").forEach(a => a.onclick = () => { cadAba = a.dataset.cad; renderCadastro(); });
  const corpo = $("#cad-corpo");
  if(cadAba === "fornecedores") renderFornecedores(corpo);
  else if(cadAba === "leite")   renderLeite(corpo);
  else if(cadAba === "queijos") renderQueijos(corpo);
  else if(cadAba === "insumos") renderInsumos(corpo);
}

function renderFornecedores(corpo){
  let html = `<div class="rotulo">Fornecedores de leite</div>`;
  if(!state.fornecedores.length){
    html += vazioCad("Cadastre quem entrega o leite:<br>nome, cidade/estado e o prazo de pagamento.");
  } else {

/* ===================== modais ===================== */
function fecharModal(){ $("#modal-host").innerHTML = ""; }
function abrirFolha(inner){
  $("#modal-host").innerHTML =
    `<div class="overlay" id="ov"><div class="folha"><div class="pega"></div>${inner}</div></div>`;
  $("#ov").addEventListener("click", e => { if(e.target.id === "ov") fecharModal(); });
}

function botaoExcluir(id, label){
  return id ? `<button class="btn btn-fantasma" id="${id}" style="margin-top:6px;color:var(--vermelho)">${label}</button>` : "";
}

/* ---------- Fornecedor ---------- */
function abrirModalFornecedor(id){
  const f = state.fornecedores.find(x=>x.id===id) || {};
  const prazos = [1,7,15,30];
  abrirFolha(`
    <h2>${id?"Editar":"Novo"} fornecedor</h2>
    <div class="campo"><label>Nome</label><input id="f-nome" value="${esc(f.nome||"")}" placeholder="Ex.: Sítio do João"></div>
    <div class="linha-campos">
      <div class="campo"><label>Cidade</label><input id="f-cidade" value="${esc(f.cidade||"")}"></div>
      <div class="campo"><label>Estado</label><input id="f-estado" maxlength="2" value="${esc(f.estado||"")}" placeholder="SP" style="text-transform:uppercase"></div>
    </div>
    <div class="campo"><label>Preferência de pagamento</label>
      <select id="f-prazo">${prazos.map(p=>`<option value="${p}" ${(f.prazo_pagamento??30)==p?"selected":""}>${prazoRot(p)}</option>`).join("")}</select></div>
    <div class="erro" id="f-erro"></div>
    <button class="btn btn-primario" id="f-salvar">Salvar</button>
    ${botaoExcluir(id?"f-excluir":"","Excluir fornecedor")}`);
  $("#f-salvar").onclick = () => salvarFornecedor(id);
  if(id) $("#f-excluir").onclick = () => excluirFornecedor(id);
}
async function salvarFornecedor(id){
  const nome = $("#f-nome").value.trim();
  if(!nome){ $("#f-erro").textContent = "Dê um nome ao fornecedor."; return; }
  const dados = { nome, cidade:$("#f-cidade").value.trim()||null, estado:$("#f-estado").value.trim().toUpperCase()||null, prazo_pagamento:parseInt($("#f-prazo").value)||30 };
  if(id){
    const f = state.fornecedores.find(x=>x.id===id); const bak = {...f}; Object.assign(f, dados);
    ordenarPorNome(state.fornecedores); fecharModal(); renderCadastro(); toast("Fornecedor atualizado.");
    const { error } = await sb.from("fornecedores").update(dados).eq("id", id);
    if(error){ Object.assign(f, bak); renderCadastro(); toast("Não deu pra salvar.", true); }
  } else {
    const novo = { id:uid(), familia_id:familiaId, ...dados };
    state.fornecedores.push(novo); ordenarPorNome(state.fornecedores); fecharModal(); renderCadastro(); toast("Fornecedor cadastrado.");
    const { error } = await sb.from("fornecedores").insert(novo);
    if(error){ state.fornecedores = state.fornecedores.filter(x=>x.id!==novo.id); renderCadastro(); toast("Não deu pra salvar.", true); }
  }
}
async function excluirFornecedor(id){
  const bak = state.fornecedores; state.fornecedores = state.fornecedores.filter(x=>x.id!==id);
  fecharModal(); renderCadastro(); toast("Fornecedor excluído.");
  const { error } = await sb.from("fornecedores").delete().eq("id", id);
  if(error){ state.fornecedores = bak; renderCadastro(); toast("Não deu pra excluir.", true); }
}

function abrirModalLote(){
  if(!state.tipos.length){
    toast("Cadastre um queijo primeiro.");
    irPara("cadastro"); cadAba = "queijos"; renderCadastro(); setTimeout(() => abrirModalQueijo(), 250); return;
  }
  const opcoes = state.tipos.map(t=>`<option value="${t.id}">${esc(t.nome)} (${t.dias_cura}d)</option>`).join("");
  abrirFolha(`
    <h2>Novo lote de produção</h2>
    <p class="dica">A data em que fica pronto é calculada pelos dias de cura do tipo.</p>
    <div class="campo"><label>Tipo de queijo</label><select id="l-tipo">${opcoes}</select></div>
    <div class="linha-campos">
      <div class="campo"><label>Data de fabricação</label><input id="l-data" type="date" value="${hoje()}"></div>
      <div class="campo"><label>Litros de leite</label><input id="l-litros" type="number" inputmode="decimal" placeholder="0"></div>
    </div>
    <div class="campo"><label>Peças produzidas</label><input id="l-pecas" type="number" inputmode="decimal" placeholder="0"></div>
    <div class="previa" id="l-previa"></div>
    <div class="erro" id="l-erro"></div>
    <button class="btn btn-primario" id="l-salvar">Registrar lote</button>`);

  const atualizarPrevia = () => {
    const t = state.tipos.find(x=>x.id === $("#l-tipo").value);
    const data = $("#l-data").value || hoje();
    const pronto = addDias(data, t? t.dias_cura : 0);
    const rest = diffDias(pronto);
    const litros = parseFloat($("#l-litros").value)||0;
    if(t && t.rendimento_esperado && litros && !$("#l-pecas").value){
      $("#l-pecas").value = Math.round(litros * t.rendimento_esperado * 100)/100;
    }
    $("#l-previa").innerHTML = t
      ? `Fica pronto em <b>${dataBR(pronto)}</b> — ${rest<=0?"pronto na hora":`daqui a <b>${rest}</b> ${rest===1?"dia":"dias"}`}.`
      : "";
  };
  $("#l-tipo").onchange = atualizarPrevia;
  $("#l-data").onchange = atualizarPrevia;
  $("#l-litros").oninput = atualizarPrevia;
  atualizarPrevia();
  $("#l-salvar").onclick = salvarLote;
}
async function salvarLote(){
  const t = state.tipos.find(x=>x.id === $("#l-tipo").value);
  const data = $("#l-data").value || hoje();
  const pecas = parseFloat($("#l-pecas").value)||0;
  if(!t){ $("#l-erro").textContent = "Escolha um tipo."; return; }
  if(pecas <= 0){ $("#l-erro").textContent = "Informe quantas peças saíram."; return; }
  const dc = t.dias_cura||0;
  const novo = {
    id: uid(), familia_id: familiaId, tipo_queijo_id: t.id,
    data_fabricacao: data,
    litros_leite: parseFloat($("#l-litros").value)||null,
    pecas_produzidas: pecas,
    dias_cura: dc,
    data_pronto: addDias(data, dc),
    validade: null,
    status: "curando"
  };
  state.lotes.unshift(novo); // otimista
  fecharModal(); irPara("inicio"); toast("Lote registrado.");
  const { error } = await sb.from("lotes").insert(novo);
  if(error){ state.lotes = state.lotes.filter(l=>l.id!==novo.id); irPara("inicio"); toast("Não deu pra salvar o lote.", true); }
}
